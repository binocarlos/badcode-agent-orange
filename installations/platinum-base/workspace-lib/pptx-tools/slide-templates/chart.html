<!DOCTYPE html>
<html>
<head>
<style>
:root {
  --primary: #0072CE;
  --bg: #FFFFFF;
  --font-heading: Arial, Helvetica, sans-serif;
  --font-body: Arial, Helvetica, sans-serif;
  --accent1: #0072CE;
  --accent2: #6400AA;
  --accent3: #C8102E;
  --accent4: #22C55E;
  --accent5: #F59E0B;
  --accent6: #64748B;
  --sidebar-color: #0072CE;
  --sidebar-width: 96pt;
}
html { background: var(--bg); }
body {
  width: 720pt;
  height: 405pt;
  margin: 0;
  padding: 0;
  background: var(--bg);
  font-family: var(--font-body);
  display: flex;
}
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  height: 405pt;
  background: var(--sidebar-color);
}
.content {
  display: flex;
  flex-direction: column;
  flex: 1;
  padding: 28pt 36pt 16pt 36pt;
}
h1 {
  font-family: var(--font-heading);
  font-size: 24pt;
  color: var(--primary);
  margin: 0 0 12pt 0;
}
.chart-area {
  flex: 0 0 auto;
}
#chart {
  width: 520pt;
  height: 245pt;
}
p.insight {
  font-size: 12pt;
  color: #333333;
  margin: 10pt 0 0 0;
  line-height: 1.4;
}
p.footer {
  font-size: 9pt;
  color: #888888;
  font-style: italic;
  margin: auto 0 0 0;
}
</style>
</head>
<body>
<div class="sidebar"></div>
<div class="content">
  <h1>{{title}}</h1>
  <div class="chart-area">
    <div id="chart" class="placeholder" style="width: 520pt; height: 245pt;"></div>
  </div>
  <p class="insight">{{insight}}</p>
  <p class="footer">{{footer}}</p>
</div>
</body>
</html>
