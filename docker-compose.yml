# Standalone agentd stack. One command:
#   cp .env.example .env && docker compose up --build
# Then open http://localhost:8080
services:
  dind:
    image: docker:27-dind
    privileged: true
    command: ["dockerd", "--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock", "--tls=false"]
    environment:
      DOCKER_TLS_CERTDIR: ""
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Builds the sandbox image and loads it into the DinD daemon, then exits.
  init-sandbox:
    image: docker:27-cli
    depends_on:
      dind:
        condition: service_healthy
    environment:
      DOCKER_HOST: tcp://dind:2375
    volumes:
      - ./sandbox:/sandbox:ro
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        docker build -t ${BASE_IMAGE:-agentkit-sandbox:dev} /sandbox
        echo "sandbox image built + present in DinD"

  # Session/message store. pgvector image so the future memory system can
  # CREATE EXTENSION vector without an image swap.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentorange}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentorange}
      POSTGRES_DB: ${POSTGRES_DB:-agentorange}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./deploy/pg-init.sql:/docker-entrypoint-initdb.d/pg-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentorange} -d ${POSTGRES_DB:-agentorange}"]
      interval: 3s
      timeout: 5s
      retries: 20

  agentd:
    build:
      context: ./go
      dockerfile: ../deploy/agentd.Dockerfile
    # Share DinD's network namespace: agentd reaches the daemon at localhost:2375,
    # and nested session containers reach agentd at the bridge gateway 172.17.0.1.
    # (postgres still resolves by service name — DNS comes from dind's netns,
    # which sits on the same compose network.)
    network_mode: "service:dind"
    depends_on:
      dind:
        condition: service_healthy
      init-sandbox:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      ADDR: ":8099"
      DATABASE_URL: postgres://${POSTGRES_USER:-agentorange}:${POSTGRES_PASSWORD:-agentorange}@postgres:5432/${POSTGRES_DB:-agentorange}?sslmode=disable
      DOCKER_HOST: tcp://localhost:2375
      AGENTKIT_IMAGE: ${BASE_IMAGE:-agentkit-sandbox:dev}
      AGENTKIT_SELF_URL: http://172.17.0.1:8099
      AGENTKIT_JWT_SECRET: ${AGENTKIT_JWT_SECRET:-}
      # Login modes (see .env.example). Neither set → legacy dev-open demo.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AGENTKIT_TEST_LOGIN: ${AGENTKIT_TEST_LOGIN:-}
      AGENTKIT_PROJECT_MAP: ${AGENTKIT_PROJECT_MAP:-}
      AGENTKIT_PROJECT_MAP_FILE: ${AGENTKIT_PROJECT_MAP_FILE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Claude Code subscription token (`claude setup-token`). Only used when
      # ANTHROPIC_API_KEY is unset → sessions bill the subscription directly.
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      AGENTKIT_DATA: /data
      # Storage backends — unset = local (fs blobs + blob-archive). See .env.example.
      AGENTKIT_BLOB_BACKEND: ${AGENTKIT_BLOB_BACKEND:-}
      GCS_BUCKET: ${GCS_BUCKET:-}
      GCS_PREFIX: ${GCS_PREFIX:-}
      AGENTKIT_REGISTRY_BACKEND: ${AGENTKIT_REGISTRY_BACKEND:-}
      AGENTKIT_REGISTRY_AUTH: ${AGENTKIT_REGISTRY_AUTH:-}
      GCP_REGION: ${GCP_REGION:-}
      GCP_PROJECT: ${GCP_PROJECT:-}
      GCP_AR_REPO: ${GCP_AR_REPO:-}
      OCI_REGISTRY: ${OCI_REGISTRY:-}
      OCI_USERNAME: ${OCI_USERNAME:-}
      OCI_PASSWORD: ${OCI_PASSWORD:-}
      # GCP auth (ADC). To use GCS/Artifact Registry, mount a service-account key
      # (volume below) and point this at it.
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    volumes:
      - agentd-data:/data
      # GCP credentials (ADC) for gcs/ociregistry — pick ONE (see docs/15):
      #  • local dev: mount your gcloud ADC (after `gcloud auth application-default login`)
      #    - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
      #  • CI / no metadata server: mount a service-account key + set GOOGLE_APPLICATION_CREDENTIALS
      #    - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/gcp/key.json:ro

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    depends_on:
      - agentd
    ports:
      - "${WEB_PORT:-8080}:8080"

volumes:
  agentd-data:
  pg-data:
