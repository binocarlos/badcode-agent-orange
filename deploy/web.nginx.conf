server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for the bundled UI.
    location / {
        try_files $uri /index.html;
    }

    # API + token → agentd (which shares DinD's netns; reachable as dind:8099).
    location /agent/ {
        proxy_pass http://dind:8099;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        # SSE: never buffer the event stream.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
    location /dev/ {
        proxy_pass http://dind:8099;
        proxy_set_header Host $host;
    }
    location /auth/ {
        proxy_pass http://dind:8099;
        proxy_set_header Host $host;
    }
}
