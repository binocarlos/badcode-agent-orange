<!DOCTYPE html>
<html>
<head>
<style>
:root {
  --primary: #0072CE;
  --bg: #FFFFFF;
  --font-heading: Arial, Helvetica, sans-serif;
  --font-body: Arial, Helvetica, sans-serif;
  --accent1: #0072CE;
  --accent2: #6400AA;
  --accent3: #C8102E;
  --accent4: #22C55E;
  --accent5: #F59E0B;
  --accent6: #64748B;
  --sidebar-color: #0072CE;
  --sidebar-width: 96pt;
  --section-bg: #0072CE;
}
html { background: var(--section-bg); }
body {
  width: 720pt;
  height: 405pt;
  margin: 0;
  padding: 0;
  background: var(--section-bg);
  font-family: var(--font-body);
  display: flex;
  justify-content: center;
  align-items: center;
}
h1 {
  font-family: var(--font-heading);
  font-size: 40pt;
  color: #FFFFFF;
  margin: 0;
  text-align: center;
}
</style>
</head>
<body>
<h1>{{title}}</h1>
</body>
</html>
